name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject Firebase Keys
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          node -e '
          const fs = require("fs");
          const clean = (val) => (val || "").trim().replace(/\r?\n|\r/g, "");
          const content = `/* ============================================
             District Gaming Zone — Autogenerated Keys
             ============================================ */
          window.firebaseConfigEnv = {
            apiKey: "${clean(process.env.FIREBASE_API_KEY)}",
            authDomain: "${clean(process.env.FIREBASE_AUTH_DOMAIN)}",
            projectId: "${clean(process.env.FIREBASE_PROJECT_ID)}",
            storageBucket: "${clean(process.env.FIREBASE_STORAGE_BUCKET)}",
            messagingSenderId: "${clean(process.env.FIREBASE_MESSAGING_SENDER_ID)}",
            appId: "${clean(process.env.FIREBASE_APP_ID)}",
            measurementId: "${clean(process.env.FIREBASE_MEASUREMENT_ID)}"
          };`;
          fs.mkdirSync("js", { recursive: true });
          fs.writeFileSync("js/env.js", content);
          console.log("🚀 js/env.js written cleanly!");
          '

      - name: Remove gitignore before deploy
        run: rm -f .gitignore

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
